services:

  web:
    build: .

    container_name: flask-web

    ports:
      - "5000:5000"

    depends_on:
      mysql:
        condition: service_healthy

  mysql:

    image: mysql:8

    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mydb

    ports:
      - "3306:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
